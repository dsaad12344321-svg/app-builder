name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme: Median-AdMob
            configuration: Release-AdMob
          - scheme: Median-AppLovin
            configuration: Release-AppLovin
    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || true

      - name: Install Tuist
        run: |
          curl -Ls https://install.tuist.io | bash
          echo "$HOME/.tuist/bin" >> $GITHUB_PATH

      - name: Generate Xcode project
        run: tuist generate --no-open

      - name: Archive (${{ matrix.scheme }}, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace Median.xcworkspace \
            -scheme "${{ matrix.scheme }}" \
            -configuration "${{ matrix.configuration }}" \
            -sdk iphoneos \
            -archivePath "build/${{ matrix.scheme }}.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            | xcpretty || true

      - name: Upload xcarchive (${{ matrix.scheme }})
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ matrix.scheme }}-xcarchive
          path: ios/build/${{ matrix.scheme }}.xcarchive
          if-no-files-found: warn