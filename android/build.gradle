// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    ext {
        coreVersion = '2.7.39'
        iconsVersion = '1.3.1'
    }
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
        maven {
            url "https://plugins.gradle.org/m2/"
        }
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.0.1'
        //[enabled by builder] classpath 'com.google.gms:google-services:4.4.4'
        //[enabled by builder] classpath 'com.google.firebase:firebase-crashlytics-gradle:3.0.7'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://maven.median.co' }
        maven { url("$rootDir/maven") }
        //[additional plugin repositories]
    }

    configurations.configureEach {
        resolutionStrategy.dependencySubstitution {
            substitute module('com.github.gonativeio:gonative-android-core') using module("co.median.android:core:$coreVersion")
        }
        resolutionStrategy {
            force "co.median.android:core:$coreVersion"
        }
    }
}
